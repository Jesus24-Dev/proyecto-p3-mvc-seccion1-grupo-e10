services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dr_logistics_ca
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dr_logistics_ca"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dr_logistics_ca
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-secreto-de-desarrollo-cambialo-en-produccion}
      JWT_EXPIRES_IN: 1d
    ports:
      # 3001 en el host por defecto para no chocar con otras apps en 3000.
      - "${BACKEND_PORT:-3001}:3000"
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run db:seed && npm run dev"

volumes:
  db-data:
